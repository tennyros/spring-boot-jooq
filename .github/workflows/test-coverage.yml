name: CI Pipeline with Gradle

on:
  push:
    branches:
      - ci-issues
      - feature/*
      - hotfix/*
  pull_request:
    branches:
      - dev

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    environment: telegram-notifications

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: users_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d users_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Gradle
        uses: gradle/wrapper-validation-action@v1

      - name: Create `gradle.properties` from GitHub Secrets
        run: echo "${{ secrets.SPRING_BOOT_JOOQ_DEMO_ENV_VARS }}" > gradle.properties

      - name: Run tests with Gradle
        run: ./gradlew test

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload Jacoco coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html

      - name: Generate coverage badge
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: build/reports/jacoco/test/jacocoTestReport.csv
          badges-directory: .github/badges

      - name: Commit and push badge (only if changed)
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git stash -u || true
          git fetch origin coverage-badge:coverage-badge
          git checkout -b coverage-badge || git checkout coverage-badge
          git status
          git stash pop || true
          git add .github/badges/jacoco.svg
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update test coverage badge"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/tennyros/spring-boot-jooq.git coverage-badge --force-with-lease
          fi

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="🚀 CI Pipeline Status: ${{ job.status }}
          
          Project: \#$(basename ${{ github.repository }}) | sed 's/-/\\-/g')
          Branch: \`${{ github.ref }}\`
          Commit: \`${{ github.sha }}\`
            
          [Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=MarkdownV2"