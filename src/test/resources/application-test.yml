spring:
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 60000
      connection-timeout: 20000
  jooq:
    sql-dialect: postgres
  application:
    name: spring-boot-jooq-test
  liquibase:
    enabled: true
    change-log: db/changelog/db.changelog-master.xml
  jpa:
    show-sql: true
logging:
  level:
    liquibase: DEBUG
    org.testcontainers: DEBUG
    org.hibernate: DEBUG